<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Alert Settings</title>

    <!-- Google Fonts: Outfit (UI) + IBM Plex Mono (monospace) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <!-- PrimeVue Theme (light, blue primary) -->
    <link rel="stylesheet" href="https://unpkg.com/primevue@3.53.0/resources/themes/lara-light-blue/theme.css" />
    <link rel="stylesheet" href="https://unpkg.com/primevue@3.53.0/resources/primevue.min.css" />

    <!-- PrimeIcons -->
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

    <!-- Tabulator (simple/white theme for bright UI) -->
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_simple.min.css" />
    <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- PrimeVue all-in-one bundle -->
    <script src="https://unpkg.com/primevue@3.53.0/core/core.min.js"></script>
    <script src="https://unpkg.com/primevue@3.53.0/toastservice/toastservice.min.js"></script>

    <style>

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        background: #f4f6f9; /* 淺灰白背景 */
        color: #0f1724;     /* 深色文字 */
        min-height: 100vh;
        padding: 32px 16px 64px;
      }

      #app { max-width: 900px; margin: 0 auto; }

      /* ── InputNumber 樣式統一整理 ── */
      .form-field .p-inputnumber,
      .form-field .p-inputnumber .p-inputtext {
        width: 100%;
        font-family: 'IBM Plex Mono', monospace !important;
        color: #0f1724;
        height: 32px !important;
        min-height: 32px !important;
        font-size: 15px !important;
        padding: 2px 8px !important;
        border-radius: 7px !important;
        vertical-align: middle;
      }
      .form-field .p-inputnumber .p-inputnumber-button {
        width: 26px !important;
        min-width: 26px !important;
        height: 15px !important;
        font-size: 13px !important;
        padding: 0 !important;
        border-radius: 6px !important;
        margin: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(37,99,235,0.12);
        background: rgba(37,99,235,0.06);
        box-shadow: none;
        transition: background .12s ease, box-shadow .12s ease, transform .06s ease;
      }
      .form-field .p-inputnumber .p-inputnumber-button-group {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0px;
        height: 32px !important;
      }
      .form-field .p-inputnumber .p-inputnumber-button .pi {
        font-size: 12px !important;
        line-height: 1;
        color: #2563eb;
      }
      .form-field .p-inputnumber .p-inputnumber-button:hover,
      .form-field .p-inputnumber .p-inputnumber-button:focus {
        background: rgba(37,99,235,0.12);
        box-shadow: 0 6px 18px rgba(37,99,235,0.06);
        transform: translateY(-1px);
      }
      .form-field {
        gap: 6px;
      }
      .form-field label {
        margin-bottom: 2px;
      }

      /* ── Page Header ── */
      .page-header {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 32px;
      }
      .page-header-icon {
        width: 46px; height: 46px;
        background: #2563eb; /* 實心藍底 */
        box-shadow: 0 6px 18px rgba(37,99,235,0.14);
        border: 1px solid rgba(37,99,235,0.18); border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; color: #ffffff; flex-shrink: 0;
      }
      .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
      .page-header p  { font-size: 13px; color: #8892a4; margin-top: 2px; }

      /* ── PrimeVue Card overrides ── */
      .p-card {
        margin-bottom: 20px !important;
        background: #ffffff !important; /* 白卡 */
        border: 1px solid #e2e7ef !important; /* 淺灰邊 */
        border-radius: 10px !important;
        transition: box-shadow .18s ease, transform .12s ease;
      }
      .p-card:hover { box-shadow: 0 10px 30px rgba(15,23,42,0.08) !important; transform: translateY(-2px); }
      .p-card .p-card-body   { padding: 24px !important; }
      .p-card .p-card-content { padding: 0 !important; }
      .settings-card {
        margin-bottom: 20px;
        background: #ffffff;
        border: 1px solid #e2e7ef;
        border-radius: 10px;
        padding: 24px;
      }

      .card-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px;
      }
      .card-title {
        display: flex; align-items: center; gap: 10px;
        font-size: 15px; font-weight: 600;
      }
      .card-title i { color: #2563eb; }

      /* ── Form layout ── */
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .form-field { display: flex; flex-direction: column; gap: 8px; }
      .form-field label {
        font-size: 12px; font-weight: 500; color: #8892a4;
        text-transform: uppercase; letter-spacing: .6px;
      }
      .form-field .p-inputnumber,
      .form-field .p-inputnumber .p-inputtext {
        width: 100%;
        font-family: 'IBM Plex Mono', monospace !important;
        color: #0f1724;
      }

      /* ── Tabulator overrides ── */
      .tabulator {
        background: #ffffff !important;
        border: 1px solid #e2e7ef !important;
        border-radius: 8px !important;
        overflow: hidden;
        font-family: 'Outfit', system-ui !important;
        font-size: 14px !important;
      }
      .tabulator .tabulator-header {
        background: #f8fafc !important;
        border-bottom: 1px solid #e2e7ef !important;
      }
      .tabulator .tabulator-header .tabulator-col {
        background: transparent !important;
        border-right: 1px solid #eef3f7 !important;
        color: #556674 !important;
        font-size: 11px !important; font-weight: 600 !important;
        text-transform: uppercase !important; letter-spacing: .6px !important;
      }
      .tabulator .tabulator-row {
        background: #ffffff !important;
        border-bottom: 1px solid #eef3f7 !important;
        color: #0f1724 !important; transition: background .12s;
      }
      .tabulator .tabulator-row:hover { background: rgba(37,99,235,0.03) !important; }
      .tabulator .tabulator-row .tabulator-cell {
        border-right: 1px solid #eef3f7 !important;
        padding: 10px 14px !important;
        font-family: 'IBM Plex Mono', monospace !important;
      }
      .tabulator .tabulator-row .tabulator-cell.tabulator-editing input {
        background: #ffffff !important;
        border: 1px solid #e2e7ef !important;
        border-radius: 6px !important;
        color: #0f1724 !important; padding: 4px 8px !important;
        font-family: 'IBM Plex Mono', monospace !important;
        outline: none !important;
        box-shadow: 0 6px 18px rgba(15,23,42,0.06) !important;
      }

      /* row delete button inside Tabulator */
      .row-delete-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 28px; height: 28px; border-radius: 6px;
        background: rgba(220,38,38,.06); color: #dc2626;
        border: 1px solid rgba(220,38,38,.12); cursor: pointer; font-size: 13px;
        transition: background .15s;
      }
      .row-delete-btn:hover { background: #dc2626; color: #fff; }

      .actions-bar { display: flex; gap: 10px; margin-top: 16px; }
      .save-bar {
        display: flex; justify-content: flex-end; gap: 12px;
        margin-top: 24px; padding-top: 20px;
        border-top: 1px solid #eef3f7;
      }
      .toast-stack {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: min(360px, calc(100vw - 32px));
      }
      .app-toast {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid #eef3f7;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15,23,42,0.06);
      }
      .app-toast-success { border-left: 6px solid #16a34a; }
      .app-toast-error   { border-left: 6px solid #dc2626; }
      .app-toast-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .app-toast-copy strong {
        font-size: 14px;
        font-weight: 600;
        color: #0f1724;
      }
      .app-toast-copy span {
        font-size: 13px;
        line-height: 1.45;
        color: #556674;
        word-break: break-word;
      }
      .app-toast-close {
        border: 0;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 14px;
        padding: 2px;
      }
      .app-toast-close:hover { color: #e2e8f0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js"></script>
  </body>
</html>
