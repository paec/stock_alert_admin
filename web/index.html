<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Alert Settings</title>

    <!-- Google Fonts: Outfit (UI) + IBM Plex Mono (monospace) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <!-- PrimeVue Theme (light, blue primary) -->
    <link rel="stylesheet" href="https://unpkg.com/primevue@3.53.0/resources/themes/lara-light-blue/theme.css" />
    <link rel="stylesheet" href="https://unpkg.com/primevue@3.53.0/resources/primevue.min.css" />

    <!-- PrimeIcons -->
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

    <!-- Tabulator (simple/white theme for bright UI) -->
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_simple.min.css" />
    <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

        <!-- Vue 3 核心函式庫。
          整個前端頁面的反應式資料、元件、模板渲染都靠它。 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

        <!-- Vue Router。
          用來做單頁應用程式(SPA)的前端路由切換。 -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>

    <!-- PrimeVue all-in-one bundle -->
    <script src="https://unpkg.com/primevue@3.53.0/core/core.min.js"></script>
    <script src="https://unpkg.com/primevue@3.53.0/toastservice/toastservice.min.js"></script>
    <script src="https://unpkg.com/primevue@3.53.0/tag/tag.min.js"></script>
    
    <style>

      /* 全域重設。
        box-sizing: border-box 讓寬高計算比較直覺。
        margin / padding 歸零可以減少不同瀏覽器的預設差異。 */
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* body 是整個頁面的外層。
        這裡設定字體、背景色、文字色與整體留白。 */
      body {
        font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        background: #f4f6f9; /* 淺灰白背景 */
        color: #0f1724;     /* 深色文字 */
        min-height: 100vh;
        padding: 32px 16px 64px;
      }

      /* Vue app 的掛載點容器。
        限制最大寬度，並用 margin: 0 auto 讓內容置中。 */
      #app { max-width: 900px; margin: 0 auto; }

      /* ===== 導覽列區塊 ===== */
      .app-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: #ffffff;
        border: 1px solid #e2e7ef;
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 20px;
      }
      .app-nav-brand {
        font-size: 14px;
        font-weight: 600;
        color: #1a2235;
        letter-spacing: 0.3px;
      }
      .app-nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .app-nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #dbe3ef;
        text-decoration: none;
        color: #556674;
        background: #f8fafc;
        font-size: 13px;
        font-weight: 500;
        transition: background .15s ease, color .15s ease, border-color .15s ease;
      }
      .app-nav-link:hover {
        color: #1d4ed8;
        border-color: #bfdbfe;
        background: #eff6ff;
      }
      .app-nav-link.active {
        color: #ffffff;
        border-color: #2563eb;
        background: #2563eb;
      }
   
      /* ===== PrimeVue InputNumber 外觀微調 =====
         這裡主要調整首頁數字輸入框的寬高、字型和上下箭頭按鈕。 */
      .form-field .p-inputnumber,
      .form-field .p-inputnumber .p-inputtext {
        width: 100%;
        font-family: 'IBM Plex Mono', monospace !important;
        color: #0f1724;
        height: 32px !important;
        min-height: 32px !important;
        font-size: 15px !important;
        padding: 2px 8px !important;
        border-radius: 7px !important;
        vertical-align: middle;
      }
      .form-field .p-inputnumber .p-inputnumber-button {
        width: 26px !important;
        min-width: 26px !important;
        height: 15px !important;
        font-size: 13px !important;
        padding: 0 !important;
        border-radius: 6px !important;
        margin: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(37,99,235,0.12);
        background: rgba(37,99,235,0.06);
        box-shadow: none;
        transition: background .12s ease, box-shadow .12s ease, transform .06s ease;
      }
      .form-field .p-inputnumber .p-inputnumber-button-group {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0px;
        height: 32px !important;
      }
      .form-field .p-inputnumber .p-inputnumber-button .pi {
        font-size: 12px !important;
        line-height: 1;
        color: #2563eb;
      }
      .form-field .p-inputnumber .p-inputnumber-button:hover,
      .form-field .p-inputnumber .p-inputnumber-button:focus {
        background: rgba(37,99,235,0.12);
        box-shadow: 0 6px 18px rgba(37,99,235,0.06);
        transform: translateY(-1px);
      }
      .form-field {
        gap: 6px;
      }
      .form-field label {
        margin-bottom: 2px;
      }

      /* ===== 頁面標題區 ===== */
      .page-header {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 32px;
      }
      .page-header-icon {
        width: 46px; height: 46px;
        background: #2563eb; /* 實心藍底 */
        box-shadow: 0 6px 18px rgba(37,99,235,0.14);
        border: 1px solid rgba(37,99,235,0.18); border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; color: #ffffff; flex-shrink: 0;
      }
      .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
      .page-header p  { font-size: 13px; color: #8892a4; margin-top: 2px; }

      /* ===== PrimeVue 卡片覆寫樣式 =====
        讓卡片更接近目前這個管理後台的視覺風格。 */
      .p-card {
        margin-bottom: 20px !important;
        background: #ffffff !important; /* 白卡 */
        border: 1px solid #e2e7ef !important; /* 淺灰邊 */
        border-radius: 10px !important;
        transition: box-shadow .18s ease, transform .12s ease;
      }
      .p-card:hover { box-shadow: 0 10px 30px rgba(15,23,42,0.08) !important; transform: translateY(-2px); }
      .p-card .p-card-body   { padding: 24px !important; }
      .p-card .p-card-content { padding: 0 !important; }
      .settings-card {
        margin-bottom: 20px;
        background: #ffffff;
        border: 1px solid #e2e7ef;
        border-radius: 10px;
        padding: 24px;
      }

      .card-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px;
      }
      .card-title {
        display: flex; align-items: center; gap: 10px;
        font-size: 15px; font-weight: 600;
      }
      .card-title i { color: #2563eb; }

      /* ===== 表單區塊排版 ===== */
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .form-field { display: flex; flex-direction: column; gap: 8px; }
      .form-field label {
        font-size: 12px; font-weight: 500; color: #8892a4;
        text-transform: uppercase; letter-spacing: .6px;
      }

      /* ===== Tabulator 樣式覆寫 =====
        Tabulator 是第三方表格套件，這裡把它的外觀改成和整體頁面一致。 */
      .tabulator {
        background: #ffffff !important;
        border: 1px solid #e2e7ef !important;
        border-radius: 8px !important;
        overflow: hidden;
        font-family: 'Outfit', system-ui !important;
        font-size: 14px !important;
      }
      .tabulator .tabulator-header {
        background: #f8fafc !important;
        border-bottom: 1px solid #e2e7ef !important;
      }
      .tabulator .tabulator-header .tabulator-col {
        background: transparent !important;
        border-right: 1px solid #eef3f7 !important;
        color: #556674 !important;
        font-size: 11px !important; font-weight: 600 !important;
        text-transform: uppercase !important; letter-spacing: .6px !important;
      }
      .tabulator .tabulator-row {
        background: #ffffff !important;
        border-bottom: 1px solid #eef3f7 !important;
        color: #0f1724 !important; transition: background .12s;
      }
      .tabulator .tabulator-row:hover { background: rgba(37,99,235,0.03) !important; }
      .tabulator .tabulator-row .tabulator-cell {
        border-right: 1px solid #eef3f7 !important;
        padding: 10px 14px !important;
        font-family: 'IBM Plex Mono', monospace !important;
      }
      .tabulator .tabulator-row .tabulator-cell.tabulator-editing input {
        background: #ffffff !important;
        border: 1px solid #e2e7ef !important;
        border-radius: 6px !important;
        color: #0f1724 !important; padding: 4px 8px !important;
        font-family: 'IBM Plex Mono', monospace !important;
        outline: none !important;
        box-shadow: 0 6px 18px rgba(15,23,42,0.06) !important;
      }

      /* 表格列中的刪除按鈕 */
      .row-delete-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 28px; height: 28px; border-radius: 6px;
        background: rgba(220,38,38,.06); color: #dc2626;
        border: 1px solid rgba(220,38,38,.12); cursor: pointer; font-size: 13px;
        transition: background .15s;
      }
      .row-delete-btn:hover { background: #dc2626; color: #fff; }

      /* 首頁底部按鈕列與右下角 toast 通知區 */
      .actions-bar { display: flex; gap: 10px; margin-top: 16px; }
      .save-bar {
        display: flex; justify-content: flex-end; gap: 12px;
        margin-top: 24px; padding-top: 20px;
        border-top: 1px solid #eef3f7;
      }
      .toast-stack {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: min(360px, calc(100vw - 32px));
      }
      .app-toast {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid #eef3f7;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15,23,42,0.06);
      }
      .app-toast-success { border-left: 6px solid #16a34a; }
      .app-toast-error   { border-left: 6px solid #dc2626; }
      .app-toast-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .app-toast-copy strong {
        font-size: 14px;
        font-weight: 600;
        color: #0f1724;
      }
      .app-toast-copy span {
        font-size: 13px;
        line-height: 1.45;
        color: #556674;
        word-break: break-word;
      }
      .app-toast-close {
        border: 0;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 14px;
        padding: 2px;
      }
      .app-toast-close:hover { color: #e2e8f0; }

      /* ===== 管理頁示意卡片區塊 =====
        這些樣式主要提供 admin 頁面的統計卡與活動清單。 */
      .admin-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }
      .admin-stat {
        border: 1px solid #e2e7ef;
        border-radius: 10px;
        background: #fbfdff;
        padding: 14px;
      }
      .admin-stat span {
        display: block;
        color: #64748b;
        font-size: 12px;
      }
      .admin-stat strong {
        display: block;
        margin-top: 6px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 22px;
        color: #2563eb;
      }
      .admin-feed {
        margin-top: 14px;
        border: 1px solid #e2e7ef;
        border-radius: 10px;
        overflow: hidden;
      }
      .admin-feed-row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid #eef3f7;
        font-size: 13px;
      }
      .admin-feed-row:last-child { border-bottom: 0; }
      .admin-feed-row time {
        color: #64748b;
        font-family: 'IBM Plex Mono', monospace;
      }

      /* 手機版調整。
         螢幕較窄時，把橫向排版改為直向，避免內容擠壓。 */
      @media (max-width: 640px) {
        .app-nav {
          flex-direction: column;
          align-items: flex-start;
        }
        .admin-panel { grid-template-columns: 1fr; }
        .admin-feed-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- 這個 div 是 Vue app 最終掛載的位置。
         Vue 啟動後，所有畫面都會由 app.js 接管。 -->
    <div id="app"></div>

    <!-- 先載入各個 view / component 檔案，
         讓它們把自己註冊到 window.StockAlertAdmin 命名空間。 -->
    <script src="views/home-view.js"></script>
    <script src="components/admin-overview-panel.js"></script>
    <script src="views/admin-view.js"></script>

    <!-- 最後載入 app.js，負責建立 router 和啟動整個 Vue 應用。 -->
    <script src="app.js"></script>
  </body>
</html>
