<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Alert Settings</title>
    <script src="https://unpkg.com/vue@3"></script>
    <!--
      Vue is loaded from the CDN above (Vue 3). This provides the `Vue` global
      used by `app.js` to create and mount the application (Composition API).
      Key ideas (Composition API):
      - The element with id="app" is the Vue root (mount point).
      - Template directives (`v-for`, `v-model`, `:attr`, `@event`) still work.
      - `setup()` 用來建立組件邏輯，並回傳要暴露給模板的 state 與 methods。
      - 在 `setup()` 中使用 `ref()` / `reactive()` 建立響應式資料；模板會自動 unwrap refs。
    -->
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
      }
      label {
        display: block;
        margin-top: 12px;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        padding: 8px 12px;
      }
      .stock-row {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Root element for the Vue app. Vue will manage everything inside this div. -->
      <h2>Stock Alert Settings</h2>

      <h3>Global Long-Term Drop</h3>

      <label for="long-term-days">Long-Term Days</label>
      <input id="long-term-days" type="number" min="1" v-model.number="longTermDrop.days" />

      <label for="long-term-percent">Long-Term Drop %</label>
      <input id="long-term-percent" type="number" min="0" step="0.1" v-model.number="longTermDrop.drop_percent" />

      <h3>Rules</h3>

      <!--
        Repeating row for each rule:
        - `v-for` iterates over `rules` (array from app data)
        - `:key` helps Vue track items efficiently
        - `v-model` creates two-way bindings (input <-> JS state)
        - `v-model.number` automatically converts input to a Number
      -->
      <div class="stock-row" v-for="(rule, i) in rules" :key="`rule-${i}`">
        <label :for="`symbol-${i}`">Symbol</label>
        <input :id="`symbol-${i}`" v-model="rule.symbol" placeholder="AAPL or 2330.TW" />

        <label :for="`days-${i}`">X Days</label>
        <input :id="`days-${i}`" type="number" min="1" v-model.number="rule.x_days" />

        <label :for="`percent-${i}`">Drop %</label>
        <input :id="`percent-${i}`" type="number" min="0" step="0.1" v-model.number="rule.y_percent" />
      </div>

      <button @click="addRule">Add</button>
      <button @click="save">Save</button>
    </div>

    <!-- The application logic: uses Composition API (`setup()`, `ref`, `onMounted`) and mounts to #app -->
    <script src="app.js"></script>
  </body>
</html>
